site_name: HF-Trainer
site_description: A unified, config-driven training framework built on the HuggingFace ecosystem
repo_url: https://github.com/your-org/hf-trainer

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - tables

nav:
  - Home: index.md
  - Installation: installation.md
  - Quick Start: quickstart.md
  - Distributed Training: distributed.md
  - Experiment Directory: experiment_dir.md
  - Architecture: architecture.md
  - Supported Tasks: tasks.md
  - Comparison: comparison.md
  - Design:
    - Overview: design/index.md
    - ModelBundle: design/model_bundle.md
    - Checkpoint: design/checkpoint.md
    - Multi-Optimizer: design/multi_optimizer.md
    - Dataset: design/dataset.md
    - Evaluation: design/evaluation.md
